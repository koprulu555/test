name: YouTube Playlist Güncelleyici

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Repo'yu çek
      uses: actions/checkout@v3
    
    - name: 🔧 Gerekli araçları yükle
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl
    
    - name: 🚀 Playlist'i güncelle
      run: |
        chmod +x update-playlist.sh
        ./update-playlist.sh
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
    
    - name: 📤 Değişiklikleri push et
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        if [ -n "$(git status --porcelain)" ]; then
          git add .
          git commit -m "🔄 Playlist güncellendi - $(date '+%d.%m.%Y %H:%M')"
          git push
          echo "✅ Değişiklikler push edildi"
        else
          echo "ℹ️ Değişiklik yok"
        fi
