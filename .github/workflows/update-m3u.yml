name: YouTube M3U Güncelle

on:
  schedule:
    - cron: '0 */3 * * *'  # Her 3 saatte bir
  workflow_dispatch:

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: 📥 Repoyu klonla
      uses: actions/checkout@v3
      
    - name: 🐍 Python kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 📦 pip'i güncelle
      run: |
        python -m pip install --upgrade pip
        
    - name: 📚 Gereksinimleri yükle
      run: |
        # requirements.txt'deki tüm paketleri yükle
        pip install -r requirements.txt
        
    - name: 🎬 M3U dosyasını oluştur
      run: |
        python generate_m3u.py
        
    - name: 🔍 Değişiklikleri kontrol et
      id: git-check
      run: |
        git diff --quiet youtube.m3u || echo "changed=true" >> $GITHUB_OUTPUT
        
    - name: 📤 Değişiklikleri push et
      if: steps.git-check.outputs.changed == 'true'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add youtube.m3u
        git commit -m "🔄 YouTube M3U güncellendi - $(date +'%Y-%m-%d %H:%M')"
        git push
