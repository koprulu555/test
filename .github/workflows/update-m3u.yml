name: YouTube M3U Güncelle

on:
  schedule:
    # Her 3 saatte bir çalış (Türkiye saatiyle 03:00, 06:00, ...)
    - cron: '0 */3 * * *'
  workflow_dispatch:  # Manuel çalıştırma için

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: 📥 Repoyu klonla
      uses: actions/checkout@v3
      
    - name: 🐍 Python kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 📦 Python paketlerini yükle
      run: |
        pip install requests
        
    - name: 🎬 M3U dosyasını oluştur
      run: |
        python generate_m3u.py
        
    - name: 🔍 Değişiklikleri kontrol et
      id: git-check
      run: |
        git diff --quiet youtube.m3u || echo "changed=true" >> $GITHUB_OUTPUT
        
    - name: 📤 Değişiklikleri push et
      if: steps.git-check.outputs.changed == 'true'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add youtube.m3u
        git commit -m "🔄 YouTube M3U güncellendi - $(date +'%Y-%m-%d %H:%M')"
        git push
